# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration


[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
            {% if commit.breaking %}**BREAKING:** {% endif %}\
            {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}
"""
footer = """
{%- for r in releases -%}
  {%- if r.version %}
    {%- if r.previous and r.previous.version %}
[{{ r.version | trim_start_matches(pat="v") }}]: https://github.com/BopStack/config/compare/{{ r.previous.version }}...{{ r.version }}
    {%- else %}
[{{ r.version | trim_start_matches(pat="v") }}]: https://github.com/BopStack/config/releases/tag/{{ r.version }}
    {%- endif %}
  {%- else %}
    {%- if r.previous and r.previous.version %}
[Unreleased]: https://github.com/BopStack/config/compare/{{ r.previous.version }}...HEAD
    {%- endif %}
  {%- endif %}
{%- endfor %}
"""
trim = true
render_always = true
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = true
require_conventional = false
split_commits = false
commit_preprocessors = []
protect_breaking_commits = false
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^doc", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Changed" },
    { message = "^style", group = "Style" },
    { message = "^test", group = "Tests" },
    { message = "^chore\\(release\\): prepare for", skip = true },
    { message = "^chore\\(deps.*\\)", skip = true },
    { message = "^chore\\(pr\\)", skip = true },
    { message = "^chore\\(pull\\)", skip = true },
    { message = "^chore|^ci", group = "Chores" },
    { message = "^revert", group = "Reverted" },
    { message = "^build", group = "Build" },
    { message = ".*", group = "Other" },
]
filter_commits = false
fail_on_unmatched_commit = false
link_parsers = []
use_branch_tags = false
topo_order = false
topo_order_commits = true
sort_commits = "oldest"
recurse_submodules = false
